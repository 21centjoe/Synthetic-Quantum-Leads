<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELOS Geometric Code Interpreter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .ui-panel { background: rgba(0, 15, 15, 0.9); border: 1px solid #00ffcc; backdrop-filter: blur(5px); }
        .bit-cell { border: 1px solid #003333; transition: all 0.2s; }
        .bit-cell.active { background: #00ffcc; color: black; }
        #canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="ui" class="absolute top-5 left-5 w-80 z-10 flex flex-col gap-4">
        <div class="ui-panel p-4 rounded-lg">
            <h1 class="text-lg font-bold mb-2 tracking-widest">INTERPRETER_v2.0</h1>
            <div class="text-[10px] space-y-1">
                <p>> INPUT_64BIT_FILE: <span id="file-hex" class="text-white">0x0000000000000000</span></p>
                <p>> PROCESSOR: <span id="proc-state">IDLE</span></p>
            </div>
            <button id="btn-process" class="mt-4 w-full bg-[#00ffcc] text-black font-bold py-2 hover:bg-[#00cc99]">PARSE_AND_BUILD</button>
        </div>

        <div class="ui-panel p-4 rounded-lg">
            <h2 class="text-xs font-bold mb-2">GEOMETRIC_CODE_MAPPING</h2>
            <div id="bit-grid" class="grid grid-cols-8 gap-1 mb-4"></div>
            <div id="log" class="h-32 overflow-y-auto text-[9px] text-[#00cc99] border-t border-[#003333] pt-2">
                > WAITING_FOR_INPUT...
            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 8;

        const group = new THREE.Group();
        scene.add(group);

        function parse64BitCode(hex) {
            // Remove 0x prefix
            const cleanHex = hex.replace('0x', '');
            // Convert to binary string
            let binary = parseInt(cleanHex, 16).toString(2).padStart(64, '0');
            
            // Map bits to geometric properties
            // Bits 0-7: Geometry Type
            // Bits 8-23: Color (R, G, B)
            // Bits 24-39: Scale
            // Bits 40-63: Rotation/Pos
            return {
                shape: parseInt(binary.substring(0, 8), 2) % 4,
                color: parseInt(binary.substring(8, 24), 2),
                scale: parseInt(binary.substring(24, 40), 2) / 65535,
                rotation: parseInt(binary.substring(40, 64), 2) / 16777215
            };
        }

        function buildGeometry(data) {
            let geometry;
            switch(data.shape) {
                case 0: geometry = new THREE.TetrahedronGeometry(1 + data.scale); break;
                case 1: geometry = new THREE.IcosahedronGeometry(1 + data.scale); break;
                case 2: geometry = new THREE.BoxGeometry(1 + data.scale, 1 + data.scale, 1 + data.scale); break;
                case 3: geometry = new THREE.SphereGeometry(0.8 + data.scale, 16, 16); break;
            }
            const material = new THREE.MeshBasicMaterial({ 
                color: data.color, 
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.y = data.rotation * Math.PI * 2;
            return mesh;
        }

        const bitGrid = document.getElementById('bit-grid');
        for(let i=0; i<64; i++) {
            const div = document.createElement('div');
            div.className = 'bit-cell w-5 h-5 flex items-center justify-center text-[8px]';
            div.id = `bit-${i}`;
            div.innerText = '0';
            bitGrid.appendChild(div);
        }

        document.getElementById('btn-process').addEventListener('click', () => {
            const randomHex = '0x' + Math.floor(Math.random() * 0xFFFFFFFFFFFFFFFF).toString(16).padStart(16, '0');
            document.getElementById('file-hex').innerText = randomHex;
            document.getElementById('proc-state').innerText = "PARSING...";
            
            const data = parse64BitCode(randomHex);
            
            // Visualization of bits
            const binary = parseInt(randomHex, 16).toString(2).padStart(64, '0');
            for(let i=0; i<64; i++) {
                const bit = document.getElementById(`bit-${i}`);
                bit.innerText = binary[i];
                if(binary[i] === '1') bit.classList.add('active');
                else bit.classList.remove('active');
            }

            // Build object
            const obj = buildGeometry(data);
            group.add(obj);
            
            document.getElementById('log').innerHTML += `<p>> INSTANTIATED_ID: ${Math.random().toString(36).slice(2, 8)}</p>`;
            document.getElementById('log').innerHTML += `<p>> PARAMS: S:${data.shape} C:${data.color.toString(16)}</p>`;
            document.getElementById('proc-state').innerText = "IDLE";
        });

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
