<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NELOS POV Manifestation Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: monospace; overflow: hidden; }
        #scroll-container { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            overflow-y: scroll; pointer-events: auto; z-index: 5;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .code-line { font-size: 14px; opacity: 0.3; transition: opacity 0.3s; }
        .code-line.active { opacity: 1; color: #fff; text-shadow: 0 0 8px #00ffcc; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { z-index: 10; pointer-events: none; }
        .read-head { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #00ffcc; z-index: 6; box-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <div id="ui" class="absolute top-10 left-10 ui-panel p-6 rounded-lg w-80 bg-black/80 border border-[#00ffcc]">
        <h1 class="text-xl font-bold mb-2 tracking-widest">POV_MANIFESTATION</h1>
        <div class="text-xs space-y-2">
            <p>> POV_STATUS: <span id="status">SCANNING</span></p>
            <p>> DATA_STREAM: <span id="stream-val">0.00</span></p>
            <p>> PRODUCT_MANIFESTED: <span id="prod-val">0.00%</span></p>
        </div>
        <div id="log" class="text-[10px] text-[#00cc99] h-20 overflow-hidden mt-4 border-t border-[#003333] pt-2">
            > SYSTEM_READY...<br>
            > ALIGNING_POV_WITH_SOLITON...
        </div>
    </div>

    <div class="read-head"></div>

    <div id="scroll-container" onscroll="handleScroll()">
        <div id="code-content" style="padding: 50vh 0;">
            <!-- Content will be generated by JS -->
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.IcosahedronGeometry(2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.5 });
        const buckyball = new THREE.Mesh(geometry, material);
        scene.add(buckyball);
        camera.position.z = 6;

        const container = document.getElementById('code-content');
        for(let i=0; i<100; i++) {
            const div = document.createElement('div');
            div.className = 'code-line p-1 text-center';
            div.innerText = `01010101_NELOS_PATH_0x${Math.random().toString(16).slice(2, 10)}_${i}`;
            container.appendChild(div);
        }

        let manifestation = 0;
        function handleScroll() {
            const scrollTop = document.getElementById('scroll-container').scrollTop;
            const lines = document.querySelectorAll('.code-line');
            const center = window.innerHeight / 2;
            
            lines.forEach(line => {
                const rect = line.getBoundingClientRect();
                const dist = Math.abs(rect.top - center);
                if(dist < 50) {
                    line.classList.add('active');
                    manifestation += 0.05;
                } else {
                    line.classList.remove('active');
                }
            });
            
            document.getElementById('status').innerText = "MANIFESTING";
            document.getElementById('prod-val').innerText = Math.min(100, manifestation.toFixed(0)) + "%";
            
            // Sync Buckyball
            buckyball.scale.setScalar(0.5 + (manifestation / 100));
            buckyball.material.opacity = 0.3 + (manifestation / 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            buckyball.rotation.y += 0.01;
            buckyball.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
